{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-dark">تسجيل الدخول</h2>
            <p class="text-slate-500 mt-2">مرحباً بعودتك إلى Kotoby</p>
        </div>
        
        <form method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">البريد الإلكتروني</label>
                <input type="email" name="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="example@email.com">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">كلمة المرور</label>
                <input type="password" name="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="••••••••">
            </div>
            
            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-primary hover:bg-indigo-600 focus:outline-none transition">
                دخول
            </button>
        </form>
        
        <p class="mt-6 text-center text-sm text-slate-600">
            ليس لديك حساب؟ <a href="{{ url_for('main.register') }}" class="font-semibold text-primary hover:underline">سجل الآن</a>
        </p>
    </div>
</div>
{% endblock %}
